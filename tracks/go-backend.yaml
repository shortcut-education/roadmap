            url: "https://medium.com/hyperskill/testing-and-benchmarking-in-go-e33a54b413e"
            type: article
      - id: testify
        title: testify и моки
        description: assert/require, suite, testify/mock, gomock, mockery, генерация моков
        interview: Чем assert отличается от require в testify, как сгенерировать мок с помощью mockery, когда использовать gomock вместо testify/mock.
        in_practice: Моки позволяют тестировать бизнес-логику изолированно от БД и внешних сервисов, а testify упрощает написание читаемых assertions.
        min_grade: Junior+
        depends_on: [testing-basics]
      - id: integration-testing
        title: Интеграционные тесты
        description: TestContainers, docker-compose, httptest, тестирование с реальной БД
        interview: Как организовать интеграционные тесты с реальной БД, чем TestContainers лучше фикстур, как тестировать HTTP-эндпоинты через httptest.
        in_practice: Интеграционные тесты ловят баги на стыке слоёв (SQL-запросы, сериализация, миграции), которые unit-тесты с моками пропускают.
