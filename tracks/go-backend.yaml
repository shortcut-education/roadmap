          sync.Pool, memory profiling, pprof
        interview: Чем GOMEMLIMIT отличается от GOGC, зачем раньше использовали ballast и почему GOMEMLIMIT его заменил, как найти утечку памяти через pprof.
        in_practice: Тюнинг GC и профилирование памяти применяются при оптимизации production-сервисов под высокую нагрузку, когда дефолтные настройки дают неприемлемый latency или OOM.
        min_grade: Middle+
        depends_on: [gc-basics]
