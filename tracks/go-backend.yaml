        description: Tri-color mark-and-sweep, write barrier, STW паузы, GOGC
        interview: Как работает tri-color алгоритм, зачем нужен write barrier, что такое STW-паузы и как GOGC влияет на частоту сборки мусора.
        in_practice: Понимание GC необходимо для оптимизации latency-критичных сервисов — например, уменьшения пауз в real-time системах и снижения потребления памяти.
        min_grade: Middle-
