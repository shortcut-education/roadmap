        description: >
          SLF4J facade, Logback конфигурация, уровни логирования,
          MDC, structured logging, Log4j2 как альтернатива
        interview: "Зачем SLF4J, если есть Logback напрямую? Какие уровни логирования существуют и когда какой использовать? Что такое MDC и как он помогает в микросервисах?"
        in_practice: Логирование — главный инструмент отладки в production. MDC позволяет привязать traceId к запросу и отследить его путь через все микросервисы.
        min_grade: Junior
        depends_on: [spring.spring-boot]
        resources:
          - title: "Official Website"
            url: "https://www.slf4j.org/"
            type: article

  - id: security
    title: Безопасность
    skills:
      - id: cryptography
        title: Криптография
        description: Хеширование (SHA, BCrypt), симметричное/асимметричное шифрование, TLS, JWT
        interview: "Чем хеширование отличается от шифрования? Почему BCrypt лучше MD5/SHA для паролей? Как устроен JWT и какие у него уязвимости?"
        in_practice: Хранение паролей, подписание токенов, HTTPS — криптография повсюду. Ошибки в ней приводят к утечкам данных и взлому аккаунтов.
        min_grade: Middle
        depends_on: [spring.spring-security]
        resources:
          - title: "Java Cryptography Tutorial"
            url: "https://jenkov.com/tutorials/java-cryptography/index.html"
            type: article

  - id: design-patterns
    title: Паттерны проектирования
    skills:
      - id: di-pattern
        title: Dependency Injection
        description: Принцип DI, constructor injection, IoC-контейнер, DIP из SOLID
        interview: "Чем DI отличается от Service Locator? Почему constructor injection предпочтительнее? Как DIP (Dependency Inversion Principle) связан с DI?"
        in_practice: DI делает код тестируемым и расширяемым. Без DI сервисы жёстко связаны, и замена реализации (например, для тестов) требует переписывания кода.
        min_grade: Junior+
        depends_on: [oop.interfaces, spring.spring-core]
        resources:
          - title: "Dependency Injection Tutorial"
            url: "https://jenkov.com/tutorials/dependency-injection/index.html"
            type: article
          - title: "Java Dependency Injection Design Pattern Example Tutorial"
            url: "https://www.digitalocean.com/community/tutorials/java-dependency-injection-design-pattern-example-tutorial"
            type: article
      - id: creational
        title: Порождающие паттерны
        description: Singleton, Factory Method, Abstract Factory, Builder, Prototype
        interview: "Как реализовать потокобезопасный Singleton? Чем Factory Method отличается от Abstract Factory? Когда Builder предпочтительнее конструктора с параметрами?"
        in_practice: Builder используется повсюду (Lombok @Builder, HttpRequest.newBuilder). Factory — для создания объектов по условию (парсеры, коннекторы).
        min_grade: Middle-
        depends_on: [di-pattern]
      - id: structural
        title: Структурные паттерны
        description: Adapter, Decorator, Proxy, Facade, Composite, Bridge
        interview: "Как Spring использует Proxy (динамические прокси и CGLIB)? Чем Decorator отличается от Proxy? Приведите пример Adapter в стандартной библиотеке Java."
        in_practice: "Spring AOP, @Transactional, @Cacheable работают через Proxy. Decorator используется в I/O (BufferedReader оборачивает Reader). Facade упрощает API модулей."
        min_grade: Middle-
        depends_on: [di-pattern]
      - id: behavioral
        title: Поведенческие паттерны
        description: Strategy, Observer, Template Method, Chain of Responsibility, Command, State
        interview: "Как Strategy реализуется через лямбды? Где в Spring используется Chain of Responsibility (Filter Chain)? Чем Observer отличается от событийной модели Spring?"
        in_practice: Strategy заменяет switch-case на полиморфизм, Template Method задаёт алгоритм с переопределяемыми шагами, Observer реализует событийную архитектуру.
        min_grade: Middle
        depends_on: [creational, structural]

  - id: networking
    title: Сетевое программирование
    skills:
      - id: http
        title: HTTP / REST
        description: HTTP-методы, статусы, заголовки, REST-принципы, HATEOAS, версионирование API
        interview: "Чем PUT отличается от PATCH? Какие статус-коды соответствуют клиентским и серверным ошибкам? Что такое идемпотентность HTTP-методов?"
        in_practice: HTTP — протокол взаимодействия между клиентом и сервером. Правильное проектирование REST API определяет удобство интеграции для фронтенда и партнёров.
        min_grade: Junior
        depends_on: [basics.io-operations]
        resources:
          - title: "Sockets"
            url: "https://docs.oracle.com/javase/tutorial/networking/sockets/index.html"
            type: article
          - title: "Java Networking"
            url: "https://www.tutorialspoint.com/java/java_networking.htm"
            type: article
          - title: "Explore top posts about Networking"
            url: "https://app.daily.dev/tags/networking?ref=roadmapsh"
            type: feed
      - id: networking-java
        title: Java Networking
        description: Socket, ServerSocket, HttpClient (Java 11+), WebSocket, SSE
        interview: "Как работает HttpClient из Java 11? Чем WebSocket отличается от SSE? Когда нужен низкоуровневый Socket вместо HTTP-клиента?"
        in_practice: HttpClient используется для вызова внешних API, WebSocket — для real-time коммуникации (чаты, уведомления), SSE — для стриминга событий клиенту.
        min_grade: Middle
        depends_on: [http, concurrency.threads]
        resources:
          - title: "Sockets"
            url: "https://docs.oracle.com/javase/tutorial/networking/sockets/index.html"
            type: article
          - title: "Java Networking"
            url: "https://www.tutorialspoint.com/java/java_networking.htm"
            type: article
