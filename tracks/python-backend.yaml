id: python-backend
title: Python Backend Developer
description: Карта навыков Python backend-разработчика
icon: "🐍"
grades: [Intern, Junior, Junior+, Middle-, Middle, Middle+, Senior]

includes:
  - common/cs-fundamentals
  - common/databases
  - common/architecture
  - common/messaging
  - common/infra
  - common/system-design

categories:
  - id: basics
    title: Основы языка
    skills:
      - id: syntax
        title: Базовый синтаксис
        description: Переменные, типы данных, операторы, приведение типов, ввод/вывод
        interview: Разница между mutable и immutable типами, что такое duck typing, как работает is vs ==.
        in_practice: Фундамент ежедневной работы — без этого невозможно писать и читать Python-код.
        min_grade: Intern
        depends_on: []
        resources:
          - title: "Python Basics"
            url: "https://www.tutorialspoint.com/python/python_basic_syntax.htm"
            type: article
          - title: "Learn X in Y Minutes / Python"
            url: "https://learnxinyminutes.com/docs/python/"
            type: article
      - id: conditionals
        title: Условия и циклы
        description: if/elif/else, for, while, break/continue, comprehensions
        interview: "Чем отличается for от while, как работает else в циклах, что делает walrus operator (:=)."
        in_practice: Любая бизнес-логика — это условия и итерации по данным, comprehensions ускоряют написание типовых трансформаций.
        min_grade: Intern
        depends_on: [syntax]
        resources:
          - title: "Conditional Statements in Python"
            url: "https://realpython.com/python-conditional-statements/"
            type: article
          - title: "Python Conditional Statements"
            url: "https://www.guru99.com/if-loop-python-conditional-structures.html"
            type: article
          - title: "Python Switch Statement 101: Match-case and alternatives"
            url: "https://roadmap.sh/python/switch"
            type: article
          - title: "How to Use a Match Statement in Python"
            url: "https://learnpython.com/blog/python-match-case-statement/"
            type: article
          - title: "Python \"while\" Loops (Indefinite Iteration)"
            url: "https://realpython.com/python-while-loop/"
            type: article
      - id: strings
        title: Работа со строками
        description: f-strings, методы строк, форматирование, кодировки, регулярные выражения
        interview: Разница между str и bytes, как работает кодировка UTF-8, что такое интернирование строк.
        in_practice: Формирование ответов API, парсинг входных данных, логирование — строки встречаются в каждом модуле.
        min_grade: Intern
        depends_on: [syntax]
      - id: functions
        title: Функции
        description: "def, *args/**kwargs, lambda, замыкания, встроенные функции, scope (LEGB)"
        interview: "Как работает правило LEGB, в чём подвох мутабельного аргумента по умолчанию (def f(a=[]))."
        in_practice: Декомпозиция кода на переиспользуемые блоки, передача callback-ов, написание утилит и хелперов.
        min_grade: Intern
        depends_on: [conditionals]
      - id: file-handling
        title: Работа с файлами
        description: open/close, with statement, чтение/запись, pathlib, os модуль
        interview: Зачем нужен with при работе с файлами, чем pathlib лучше os.path, как читать большой файл построчно.
        in_practice: Чтение конфигов, запись логов, обработка загруженных файлов, работа с CSV/JSON-экспортами.
        min_grade: Junior
        depends_on: [functions]
        resources:
          - title: "Pyhton File open"
            url: "https://www.w3schools.com/python/python_file_handling.asp"
            type: article
          - title: "Working With Files in Python"
            url: "https://realpython.com/working-with-files-in-python/"
            type: article
          - title: "Python JSON"
            url: "https://www.w3schools.com/python/python_json.asp"
            type: article
          - title: "Working With JSON Data in Python"
            url: "https://realpython.com/python-json/"
            type: article
      - id: modules
        title: Модули и пакеты
        description: import, __init__.py, relative imports, __name__ == __main__, sys.path
        interview: Как Python ищет модули (sys.path), что происходит при циклическом импорте, зачем нужен __init__.py.
        in_practice: Организация кода в проекте — правильная структура пакетов критична для поддерживаемости большого приложения.
        min_grade: Junior
        depends_on: [functions]
        resources:
          - title: "Python Modules"
            url: "https://docs.python.org/3/tutorial/modules.html"
            type: official
          - title: "Modules in Python"
            url: "https://www.programiz.com/python-programming/modules"
            type: article
      - id: regex
        title: Регулярные выражения
        description: re модуль, Pattern, Match, группы, lookahead/lookbehind, re.compile
        interview: "Разница между match, search и findall; зачем компилировать паттерн через re.compile; жадные vs ленивые квантификаторы."
        in_practice: Валидация форматов (email, телефон), парсинг логов и текстовых данных, извлечение структуры из неструктурированного текста.
        min_grade: Junior+
        depends_on: [strings]
        resources:
          - title: "Regular Expressions in Python"
            url: "https://docs.python.org/3/library/re.html"
            type: official
          - title: "Python Regular Expressions"
            url: "https://developers.google.com/edu/python/regular-expressions"
            type: article
          - title: "Python - Regular Expressions"
            url: "https://www.tutorialspoint.com/python/python_reg_expressions.htm"
            type: article

  - id: data-structures
    title: Структуры данных
    skills:
      - id: lists
        title: Списки
        description: list, внутреннее устройство (dynamic array), list comprehensions, срезы
        interview: "Сложность операций append, insert(0), in для списка; как устроен dynamic array внутри; чем list отличается от array."
        in_practice: Основная рабочая коллекция — хранение результатов запросов, формирование ответов, batch-обработка данных.
        min_grade: Intern
        depends_on: [basics.syntax]
        resources:
          - title: "Python Official Documentation on Listsc"
            url: "https://docs.python.org/3/tutorial/introduction.html#lists"
            type: official
          - title: "Tuples vs. Lists vs. Sets in Python"
            url: "https://jerrynsh.com/tuples-vs-lists-vs-sets-in-python/"
            type: article
          - title: "Python for Beginners: Lists"
            url: "https://thenewstack.io/python-for-beginners-lists/"
            type: article
          - title: "Python for Beginners: When and How to Use Tuples"
            url: "https://thenewstack.io/python-for-beginners-when-and-how-to-use-tuples/"
            type: article
      - id: tuples
        title: Кортежи
        description: tuple, именованные кортежи (namedtuple), immutability, packing/unpacking
        interview: Почему tuple можно использовать как ключ dict, а list нет; в чём разница tuple и namedtuple.
        in_practice: Возврат нескольких значений из функции, использование как неизменяемых записей, ключей для кэширования.
        min_grade: Intern
        depends_on: [lists]
        resources:
          - title: "Tuples Documentation"
            url: "https://docs.python.org/3/tutorial/datastructures.html#tuples-and-sequences"
            type: official
          - title: "When and How to Use Tuples"
            url: "https://thenewstack.io/python-for-beginners-when-and-how-to-use-tuples/"
            type: article
          - title: "Python's tuple Data Type: A Deep Dive With Examples"
            url: "https://realpython.com/python-tuple/#getting-started-with-pythons-tuple-data-type"
            type: article
      - id: dicts
        title: Словари
        description: dict, внутреннее устройство (hash table), dict comprehensions, defaultdict, OrderedDict
        interview: "Как устроена хэш-таблица в dict, что будет при коллизии хэшей, почему dict упорядочен с Python 3.7."
        in_practice: Маппинг данных, конфиги, JSON-ответы, кэширование — словарь используется практически в каждом модуле бэкенда.
        min_grade: Junior
        depends_on: [lists]
        resources:
          - title: "Dictionaries in Python"
            url: "https://docs.python.org/3/tutorial/datastructures.html#dictionaries"
            type: official
          - title: "Dictionaries in Python"
            url: "https://realpython.com/python-dicts/"
            type: article
          - title: "Hashmaps in Python: Master Implementation and Use Cases"
            url: "https://roadmap.sh/python/hashmap"
            type: article
      - id: sets
        title: Множества
        description: set, frozenset, операции (union, intersection, difference), set comprehensions
        interview: Сложность операции in для set vs list, когда использовать frozenset, как set определяет уникальность элементов.
        in_practice: Быстрая проверка принадлежности, удаление дубликатов, вычисление пересечений прав доступа или тегов.
        min_grade: Junior
        depends_on: [lists]
        resources:
          - title: "Python Official Documentation on Sets"
            url: "https://docs.python.org/3/tutorial/datastructures.html#sets"
            type: official
          - title: "An In-Depth Guide to Working with Python Sets"
            url: "https://learnpython.com/blog/python-sets/"
            type: article
      - id: collections
        title: Модуль collections
        description: Counter, deque, ChainMap, defaultdict, OrderedDict
        interview: "Когда использовать deque вместо list, как работает Counter.most_common(), чем defaultdict лучше обычного dict.get()."
        in_practice: Подсчёт частот событий (Counter), реализация очередей (deque), удобная группировка данных (defaultdict(list)).
        min_grade: Junior+
        depends_on: [dicts, sets]

  - id: oop
    title: Объектно-ориентированное программирование
    skills:
      - id: classes
        title: Классы и объекты
        description: class, __init__, self, атрибуты класса/экземпляра, __str__/__repr__
        interview: "Разница между атрибутом класса и экземпляра, зачем нужен self, чем __str__ отличается от __repr__."
        in_practice: Моделирование сущностей (User, Payment), создание сервисов, инкапсуляция логики в объекты.
        min_grade: Intern
        depends_on: [basics.functions]
        resources:
          - title: "Classes in Python"
            url: "https://docs.python.org/3/tutorial/classes.html"
            type: official
      - id: inheritance
        title: Наследование
        description: Одиночное и множественное наследование, MRO (C3 linearization), super()
        interview: "Как работает MRO при множественном наследовании (diamond problem), что делает super() и как он определяет следующий класс."
        in_practice: Расширение базовых классов фреймворков (Django View, Model), создание иерархий сервисов с общей логикой.
        min_grade: Junior
        depends_on: [classes]
        resources:
          - title: "Python Official Documentation on Inheritance"
            url: "https://docs.python.org/3/tutorial/classes.html#inheritance"
            type: official
      - id: encapsulation
        title: Инкапсуляция
        description: Публичные/приватные атрибуты, name mangling, property, геттеры/сеттеры
        interview: "Чем _ отличается от __ в именах атрибутов, как работает name mangling, зачем использовать @property вместо прямого доступа."
        in_practice: Защита внутреннего состояния объектов, валидация при записи через property, контроль API класса.
        min_grade: Junior
        depends_on: [classes]
        resources:
          - title: "Encapsulation in Python: All You Need to Know"
            url: "https://roadmap.sh/python/encapsulation"
            type: article
          - title: "Encapsulation in Python: A Comprehensive Guide"
            url: "https://www.datacamp.com/tutorial/encapsulation-in-python-object-oriented-programming"
            type: article
          - title: "Encapsulation"
            url: "https://programming-25.mooc.fi/part-9/3-encapsulation"
            type: article
      - id: dunder-methods
        title: Dunder-методы
        description: "__len__, __getitem__, __eq__, __hash__, __enter__/__exit__, __call__, протоколы"
        interview: "Связь между __eq__ и __hash__, зачем нужен __call__, как реализовать итерируемый объект через __iter__/__next__."
        in_practice: Создание объектов с интуитивным интерфейсом — сравнение, итерация, использование в with-блоках, вызов как функции.
        min_grade: Junior+
        depends_on: [inheritance]
      - id: abc
        title: Абстрактные классы
        description: abc модуль, ABC, abstractmethod, Protocol (structural subtyping)
        interview: "Чем ABC отличается от Protocol, можно ли создать экземпляр абстрактного класса, зачем нужен structural subtyping."
        in_practice: Определение контрактов для сервисов и репозиториев, подмена реализаций в тестах, построение плагинной архитектуры.
        min_grade: Junior+
        depends_on: [inheritance]

  - id: advanced
    title: Продвинутый Python
    skills:
      - id: decorators
        title: Декораторы
        description: >
          Функции-декораторы, декораторы классов, functools.wraps,
          параметризованные декораторы, стекирование
        interview: "Зачем нужен functools.wraps, как написать декоратор с параметрами, в каком порядке выполняются стекированные декораторы."
        in_practice: Логирование, проверка прав доступа, кэширование, retry-логика — декораторы убирают повторяющийся boilerplate-код.
        min_grade: Junior+
        depends_on: [oop.dunder-methods]
        resources:
          - title: "Learn Decorators in Python"
            url: "https://pythonbasics.org/decorators/"
            type: article
          - title: "Python Decorators"
            url: "https://www.datacamp.com/tutorial/decorators-python"
            type: article
      - id: iterators
        title: Итераторы и генераторы
        description: >
          iter/next протокол, yield, yield from, генераторные выражения,
          itertools, бесконечные последовательности
        interview: "Чем генератор отличается от списка, когда использовать yield from, как работает ленивая загрузка через генераторы."
        in_practice: Потоковая обработка больших файлов и API-ответов без загрузки всего в память, построение пайплайнов обработки данных.
        min_grade: Junior+
        depends_on: [data-structures.collections]
        resources:
          - title: "Python Official Documentation on Iterators"
            url: "https://docs.python.org/3/tutorial/classes.html#iterators"
            type: official
          - title: "Python Iterators"
            url: "https://www.programiz.com/python-programming/iterator"
            type: article
          - title: "Iterators and Iterables in Python"
            url: "https://realpython.com/python-iterators-iterables/"
            type: article
      - id: context-managers
        title: Контекстные менеджеры
        description: with statement, __enter__/__exit__, contextlib, @contextmanager
        interview: "Что происходит при исключении внутри with-блока, как написать свой контекстный менеджер через класс и через @contextmanager."
        in_practice: Управление ресурсами — транзакции БД, сетевые соединения, временные файлы, блокировки.
        min_grade: Junior+
        depends_on: [decorators]
      - id: type-hints
        title: Type Hints и Typing
        description: >
          Аннотации типов, typing модуль (Optional, Union, List, Dict),
          Protocol, TypeVar, Generic, Literal
        interview: "Чем Optional[str] отличается от str | None, как работают TypeVar и Generic, влияют ли аннотации на производительность."
        in_practice: Документирование контрактов функций, автокомплит в IDE, раннее обнаружение ошибок через mypy/pyright.
        min_grade: Junior+
        depends_on: [oop.abc]
      - id: memory-model
        title: Управление памятью
        description: >
          Reference counting, cyclic GC, pymalloc, __slots__,
          weakref, sys.getsizeof, objgraph, memory profiling
        interview: "Как работает reference counting и зачем нужен cyclic GC, что даёт __slots__, как найти утечку памяти в production."
        in_practice: Оптимизация сервисов с высокой нагрузкой, профилирование memory leaks, уменьшение потребления памяти в долгоживущих процессах.
        min_grade: Middle
        depends_on: [data-structures.dicts]
      - id: metaclasses
        title: Метаклассы и дескрипторы
        description: >
          type(), __new__, __init_subclass__, __set_name__,
          descriptor protocol (__get__/__set__/__delete__), dataclasses internals
        interview: "Чем __new__ отличается от __init__, как работает descriptor protocol, когда метаклассы оправданы вместо декораторов."
        in_practice: Понимание внутренностей Django ORM (Field — дескриптор, Model — метакласс), создание DSL и фреймворковых абстракций.
        min_grade: Middle+
        depends_on: [memory-model]

  - id: typing-tools
    title: Статическая типизация
    skills:
      - id: pydantic
        title: Pydantic
        description: BaseModel, валидация данных, сериализация, Field, validator, Settings
        interview: "Чем Pydantic v2 отличается от v1, как работает валидация через model_validator, разница между BaseModel и dataclass."
        in_practice: Валидация входных данных API, описание схем запросов/ответов, загрузка и проверка конфигурации приложения.
        min_grade: Junior+
        depends_on: [advanced.type-hints]
        resources:
          - title: "Pydantic Documentation"
            url: "https://docs.pydantic.dev/latest/"
            type: official
      - id: mypy
        title: mypy / pyright
        description: Статическая проверка типов, strict mode, плагины, стратегия внедрения
        interview: "Чем отличается strict mode от обычного, как типизировать декораторы и callback-и, что такое type narrowing."
        in_practice: Ловит баги до запуска кода — неправильные типы аргументов, забытые Optional-проверки, несовместимые интерфейсы.
        min_grade: Middle-
        depends_on: [advanced.type-hints]
        resources:
          - title: "mypy documentation"
            url: "https://mypy-lang.org/"
            type: official
          - title: "python/mypy"
            url: "https://github.com/python/mypy"
            type: opensource
          - title: "Pyright Documentation"
            url: "https://microsoft.github.io/pyright/"
            type: official

  - id: concurrency
    title: Конкурентность и асинхронность
    skills:
      - id: gil
        title: GIL
        description: >
          Что такое GIL, почему существует, влияние на CPU-bound задачи,
          как обходить (multiprocessing, C extensions)
        interview: "Почему GIL не мешает I/O-bound задачам, как обойти GIL для CPU-bound вычислений, что изменилось в Python 3.13 (free-threaded)."
        in_practice: Понимание GIL определяет выбор между threading, multiprocessing и asyncio при проектировании нагруженных сервисов.
        min_grade: Junior+
        depends_on: [oop.classes]
        resources:
          - title: "What is GIL?"
            url: "https://realpython.com/python-gil/"
            type: article
      - id: threading
        title: Threading
        description: threading модуль, Lock, RLock, Semaphore, Event, Queue, daemon threads
        interview: "Чем Lock отличается от RLock, что такое race condition и как его предотвратить, когда threading лучше asyncio."
        in_practice: Параллельная отправка HTTP-запросов, фоновые задачи в приложении, работа с пулом потоков через ThreadPoolExecutor.
        min_grade: Junior+
        depends_on: [gil]
        resources:
          - title: "Python Threading Library"
            url: "https://docs.python.org/3/library/threading.html"
            type: official
          - title: "Python Multithreading: The Most Practical Intro"
            url: "https://roadmap.sh/python/multithreading"
            type: article
          - title: "Introduction to Threading in Python"
            url: "https://realpython.com/intro-to-python-threading/"
            type: article
      - id: multiprocessing
        title: Multiprocessing
        description: Process, Pool, shared memory, Manager, pipe, очереди между процессами
        interview: "Как передаются данные между процессами (pickle), чем shared memory отличается от Manager, подводные камни fork vs spawn."
        in_practice: CPU-bound вычисления (обработка изображений, ML-инференс), параллельная обработка батчей данных в воркерах.
        min_grade: Middle-
        depends_on: [threading]
        resources:
          - title: "Python Documentation"
            url: "https://docs.python.org/3/library/multiprocessing.html"
            type: official
          - title: "Multiprocessing in Python with Example"
            url: "https://www.digitalocean.com/community/tutorials/python-multiprocessing-example"
            type: article
          - title: "Multiprocessing in Python"
            url: "https://realpython.com/python-multiprocessing/"
            type: article
      - id: asyncio-basics
        title: asyncio основы
        description: >
          async/await, coroutines, asyncio.run, tasks, gather,
          event loop, Future, создание async-сервера
        interview: "Чем coroutine отличается от обычной функции, как работает event loop, что будет если забыть await."
        in_practice: Асинхронные веб-серверы (FastAPI, aiohttp), Telegram-боты на aiogram, одновременная обработка множества I/O-операций.
        min_grade: Middle-
        depends_on: [gil]
      - id: asyncio-advanced
        title: asyncio продвинутый
        description: >
          TaskGroup (structured concurrency), Semaphore, Lock, Queue в asyncio,
          aiohttp, httpx, asyncpg, uvloop
        interview: "Чем TaskGroup лучше gather, как ограничить concurrency через Semaphore, что такое structured concurrency и зачем оно нужно."
        in_practice: Ограничение параллельных запросов к внешним API, высоконагруженные async-воркеры, микросервисная коммуникация.
        min_grade: Middle
        depends_on: [asyncio-basics]

  - id: packaging
    title: Управление зависимостями
    skills:
