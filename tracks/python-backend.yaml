      - id: documentation
        title: Документация
        description: docstrings (Google/NumPy style), Sphinx, autodoc, MkDocs, type stubs
        interview: "Чем Google-style docstring отличается от NumPy-style, как автоматически генерировать документацию из кода."
        in_practice: Документирование API для коллег, автогенерация справки для внутренних библиотек, поддержка onboarding новых разработчиков.
        min_grade: Junior+
        depends_on: [linting]

  - id: frameworks
    title: Web-фреймворки
    skills:
      - id: fastapi
        title: FastAPI
        description: >
          Роутинг, Pydantic модели, Depends (DI), middleware,
          OpenAPI, background tasks, WebSocket
        interview: "Как работает Depends (dependency injection), чем FastAPI отличается от Flask, как настроить middleware для аутентификации."
        in_practice: Быстрое создание REST API с автодокументацией, микросервисы с асинхронной обработкой, интеграция с Pydantic для валидации.
        min_grade: Junior
        depends_on: [typing-tools.pydantic]
      - id: django
        title: Django
        description: >
          ORM, views (CBV/FBV), templates, middleware, admin,
          signals, management commands, forms, migrations
        interview: "Чем CBV лучше FBV и наоборот, как работают миграции, жизненный цикл запроса через middleware."
        in_practice: Полноценные веб-приложения с админкой из коробки, быстрый прототип с ORM и миграциями, CMS и внутренние инструменты.
        min_grade: Junior+
        depends_on: [oop.classes]
        resources:
          - title: "Visit the Dedicated Django Roadmap"
