        title: Линтинг и форматирование
        description: ruff, black, isort, flake8, pylint, pre-commit hooks
        interview: "Чем ruff лучше flake8+isort+black, как настроить pre-commit hooks, разница между линтером и форматтером."
        in_practice: Единый стиль кода в команде, автоматическое форматирование при коммите, раннее обнаружение типовых ошибок.
        min_grade: Junior
        depends_on: [basics.modules]
        resources:
