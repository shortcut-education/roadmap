        depends_on: [frameworks.fastapi]
      - id: cryptography
        title: Криптография
        description: hashlib, secrets, cryptography library, TLS/SSL, шифрование данных
        interview: "Чем хэширование отличается от шифрования, почему нельзя использовать MD5 для паролей, как работает TLS handshake."
        in_practice: Хэширование паролей (bcrypt/argon2), генерация токенов через secrets, шифрование чувствительных данных в БД.
        min_grade: Middle
        depends_on: [auth]
