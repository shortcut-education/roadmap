            url: "https://app.daily.dev/tags/django?ref=roadmapsh"
            type: feed
      - id: flask
        title: Flask
        description: >
          Blueprints, Jinja2, extensions, application factory,
          context (app/request), Flask-SQLAlchemy
        interview: "Что такое application factory и зачем она нужна, как работает request context, чем Blueprint отличается от Django app."
        in_practice: Легковесные API и микросервисы, прототипирование, проекты где не нужна тяжёлая инфраструктура Django.
        min_grade: Junior
        depends_on: [oop.classes]
        resources:
          - title: "Flask Website"
            url: "https://flask.palletsprojects.com/"
            type: official
          - title: "Flask Tutorial"
            url: "https://flask.palletsprojects.com/en/3.0.x/tutorial/"
            type: official
          - title: "Explore top posts about Flask"
            url: "https://app.daily.dev/tags/flask?ref=roadmapsh"
            type: feed
      - id: starlette
        title: Starlette / ASGI
        description: >
          ASGI-протокол, Starlette internals, middleware stack,
          lifespan events, ASGI vs WSGI
        interview: "Чем ASGI отличается от WSGI, как работает lifespan protocol, какие задачи решает middleware stack в Starlette."
        in_practice: Понимание того, как FastAPI работает под капотом, настройка WebSocket и SSE, оптимизация middleware-цепочки.
        min_grade: Middle-
        depends_on: [fastapi, concurrency.asyncio-basics]
      - id: celery
        title: Celery
        description: >
          Tasks, workers, beat (расписание), результаты, retry, chains/groups/chords,
          мониторинг (Flower), brokers (Redis, RabbitMQ)
        interview: "Как обеспечить идемпотентность задач, чем chain отличается от group, как настроить retry с exponential backoff."
        in_practice: Отложенная отправка уведомлений, генерация отчётов в фоне, периодические задачи (очистка, синхронизация с внешними API).
        min_grade: Middle-
        depends_on: [fastapi]

  - id: orm
    title: ORM и базы данных
    skills:
      - id: sqlalchemy
        title: SQLAlchemy
        description: >
          Declarative mapping, Session, Query API, relationship(),
          eager/lazy loading, N+1, Alembic миграции
        interview: "Как решить проблему N+1 запросов, чем eager loading отличается от lazy, как работает Unit of Work в Session."
        in_practice: Работа с БД в FastAPI/Flask-проектах, сложные запросы с join-ами, управление миграциями через Alembic.
        min_grade: Junior+
        depends_on: [common/databases.sql-basics]
      - id: django-orm
        title: Django ORM
        description: >
          QuerySet API, Manager, F/Q-объекты, select_related/prefetch_related,
          аннотации, агрегации, сырые запросы
        interview: "Чем select_related отличается от prefetch_related, как работают F и Q объекты, когда QuerySet выполняется (lazy evaluation)."
        in_practice: Построение сложных выборок с аннотациями и агрегациями, оптимизация запросов для админки и API, написание кастомных Manager-ов.
        min_grade: Junior+
        depends_on: [frameworks.django, common/databases.sql-basics]

  - id: testing
    title: Тестирование
    skills:
      - id: pytest
        title: pytest
        description: fixtures, parametrize, conftest, markers, плагины, assert rewriting
        interview: "Как работает scope у fixture (function/class/module/session), зачем нужен conftest.py, как параметризовать тесты."
        in_practice: Написание unit-тестов для сервисов и утилит, параметризация edge cases, настройка тестовой инфраструктуры через fixtures.
        min_grade: Junior
        depends_on: []
        resources:
          - title: "Pytest Docs"
            url: "https://docs.pytest.org/"
            type: official
          - title: "Pytest Tutorial"
            url: "https://www.tutorialspoint.com/pytest/index.htm"
            type: article
          - title: "Effective Python Testing With Pytest"
            url: "https://realpython.com/pytest-python-testing/"
            type: article
          - title: "Explore top posts about Python"
            url: "https://app.daily.dev/tags/python?ref=roadmapsh"
            type: feed
      - id: mocking
        title: Моки и стабы
        description: "unittest.mock, patch, MagicMock, side_effect, pytest-mock, monkeypatch"
        interview: "Куда правильно направлять patch (where to patch), чем MagicMock отличается от Mock, когда использовать side_effect."
        in_practice: Изоляция тестов от внешних зависимостей (API, БД, файловая система), проверка вызовов и аргументов при интеграции с внешними сервисами.
        min_grade: Junior+
        depends_on: [pytest]
      - id: integration-testing
        title: Интеграционные тесты
        description: TestContainers, docker-compose, factory_boy, httpx.AsyncClient, pytest-asyncio
        interview: "Чем интеграционные тесты отличаются от unit, как поднять тестовую БД через TestContainers, зачем нужен factory_boy."
        in_practice: Проверка реальных сценариев (API -> БД -> ответ), тестирование миграций, уверенность в работоспособности системы перед деплоем.
        min_grade: Middle-
        depends_on: [mocking]
      - id: tox
        title: tox / nox
        description: Тестирование в нескольких средах, автоматизация CI, матрица Python-версий
        interview: "Зачем тестировать на нескольких версиях Python, чем nox лучше tox, как интегрировать с GitHub Actions."
        in_practice: Проверка совместимости библиотеки с разными версиями Python/Django, автоматизация линтинга и тестов в CI-пайплайне.
        min_grade: Middle-
        depends_on: [integration-testing]
        resources:
          - title: "Tox Documentation"
            url: "https://tox.wiki/en/"
            type: official

  - id: security
    title: Безопасность
    skills:
      - id: auth
        title: Аутентификация и авторизация
        description: JWT, OAuth2, session-based auth, CORS, CSRF, bcrypt/passlib
        interview: "Чем JWT отличается от session-based auth, как работает OAuth2 flow, что такое CSRF-атака и как от неё защититься."
        in_practice: Реализация логина/регистрации, интеграция с SSO-провайдерами (Google, GitHub), защита API-эндпоинтов.
